[databases]
; All connections routed through PgBouncer to PostgreSQL primary
RNS = host=postgres-primary port=5432 dbname=RNS

; Read replica pool
RNS_replica = host=postgres-replica port=5432 dbname=RNS

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; Authentication
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Pool mode: transaction — release connection after each transaction
pool_mode = transaction

; Connection limits
max_client_conn = 500
default_pool_size = 50
reserve_pool_size = 10
reserve_pool_timeout = 3

; Timeouts
server_idle_timeout = 600
server_lifetime = 3600
server_connect_timeout = 15
client_idle_timeout = 0
query_timeout = 0

; Ignore startup parameters not supported in transaction mode
ignore_startup_parameters = extra_float_digits,options,statement_timeout

; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

; Admin
admin_users = postgres
stats_users = postgres
