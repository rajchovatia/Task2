# PostgreSQL Primary — Replication Settings
# This file is mounted as an additional config for the primary

# WAL (Write-Ahead Log) settings for streaming replication
wal_level = replica
max_wal_senders = 5
wal_keep_size = 256MB

# Replication slots for reliable replication
max_replication_slots = 5

# Synchronous replication (optional — set to 'on' for sync, 'off' for async)
synchronous_commit = on

# Listen on all interfaces (required for Docker networking)
listen_addresses = '*'

# Logging
log_replication_commands = on
