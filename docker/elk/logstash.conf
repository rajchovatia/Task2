# Logstash Pipeline Configuration
# Receives JSON logs from Django/Celery containers and sends to Elasticsearch

input {
  # Receive logs via TCP (Docker log driver sends here)
  tcp {
    port => 5044
    codec => json_lines
  }

  # Alternative: receive via UDP
  udp {
    port => 5044
    codec => json_lines
  }
}

filter {
  # Parse JSON log fields
  if [message] {
    json {
      source => "message"
      target => "parsed"
      skip_on_invalid_json => true
    }
  }

  # Extract correlation ID if present
  if [parsed][correlation_id] {
    mutate {
      add_field => { "correlation_id" => "%{[parsed][correlation_id]}" }
    }
  }

  # Extract notification-specific fields
  if [parsed][notification_id] {
    mutate {
      add_field => { "notification_id" => "%{[parsed][notification_id]}" }
    }
  }

  if [parsed][channel] {
    mutate {
      add_field => { "channel" => "%{[parsed][channel]}" }
    }
  }

  # Add service name from Docker container name
  if [docker][container][name] {
    mutate {
      add_field => { "service" => "%{[docker][container][name]}" }
    }
  }

  # Parse timestamp
  date {
    match => ["[parsed][asctime]", "ISO8601", "yyyy-MM-dd HH:mm:ss,SSS"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "logstash-%{+YYYY.MM.dd}"
  }

  # Debug output (remove in production)
  # stdout { codec => rubydebug }
}
