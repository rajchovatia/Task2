# Prometheus Alert Rules for Notification System
groups:
  - name: notification_system_alerts
    rules:
      # ── Queue Depth Alerts ──
      - alert: QueueDepthCritical
        expr: rabbitmq_queue_messages > 50000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "RabbitMQ queue depth > 50K for 5 minutes"
          description: "Queue {{ $labels.queue }} has {{ $value }} messages. Scale workers."

      - alert: DLQNotEmpty
        expr: rabbitmq_queue_messages{queue=~"dead_.*"} > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Dead letter queue is not empty"
          description: "DLQ {{ $labels.queue }} has {{ $value }} messages for 10+ minutes."

      # ── Error Rate Alerts ──
      - alert: HighNotificationFailureRate
        expr: >
          rate(django_http_responses_total_by_status_total{status=~"5.."}[15m])
          / rate(django_http_responses_total_by_status_total[15m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Notification failure rate > 5%"
          description: "API error rate is {{ $value | humanizePercentage }} over 15 minutes."

      # ── Latency Alerts ──
      - alert: HighP99Latency
        expr: >
          histogram_quantile(0.99, rate(django_http_requests_latency_seconds_by_view_method_bucket[5m])) > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p99 latency > 30s"
          description: "View {{ $labels.view }} has p99 latency of {{ $value }}s."

      # ── WebSocket Alerts ──
      - alert: WebSocketConnectionDrop
        expr: >
          delta(django_websocket_connections_active[1m]) < -100
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "WebSocket connections dropped significantly"
          description: "Active WS connections dropped by {{ $value }} in 1 minute."

      # ── Infrastructure Alerts ──
      - alert: RedisDown
        expr: up{job=~"redis.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis instance is down"
          description: "Redis instance {{ $labels.instance }} is unreachable."

      - alert: RabbitMQNodeDown
        expr: up{job="rabbitmq"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "RabbitMQ node is down"
          description: "RabbitMQ node {{ $labels.node }} is unreachable."

      - alert: PgBouncerHighConnectionUsage
        expr: pgbouncer_pools_client_active_connections > 400
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PgBouncer connection usage high"
          description: "{{ $value }}/500 client connections in use."
