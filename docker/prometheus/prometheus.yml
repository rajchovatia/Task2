# Prometheus Configuration
# Scrapes metrics from Django, Celery, RabbitMQ, Redis

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alert rules
rule_files:
  - "/etc/prometheus/alert_rules.yml"

# Alertmanager (optional — Grafana handles alerts)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]

scrape_configs:
  # ── Django API Metrics (django-prometheus) ──
  - job_name: "django-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "api"

  # ── Django WebSocket Metrics ──
  - job_name: "django-ws"
    metrics_path: /metrics
    static_configs:
      - targets: ["ws:8001"]
        labels:
          service: "ws"

  # ── RabbitMQ Metrics (built-in Prometheus plugin) ──
  - job_name: "rabbitmq"
    metrics_path: /metrics
    static_configs:
      - targets: ["rabbitmq-1:15692"]
        labels:
          node: "rabbitmq-1"
      - targets: ["rabbitmq-2:15692"]
        labels:
          node: "rabbitmq-2"
      - targets: ["rabbitmq-3:15692"]
        labels:
          node: "rabbitmq-3"

  # ── Redis Metrics (via redis-exporter) ──
  - job_name: "redis-cache"
    static_configs:
      - targets: ["redis-exporter-cache:9121"]
        labels:
          instance: "redis-cache"

  - job_name: "redis-celery"
    static_configs:
      - targets: ["redis-exporter-celery:9121"]
        labels:
          instance: "redis-celery"

  - job_name: "redis-channels"
    static_configs:
      - targets: ["redis-exporter-channels:9121"]
        labels:
          instance: "redis-channels"

  # ── Prometheus self-monitoring ──
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
